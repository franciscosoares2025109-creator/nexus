{% load static %}
<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Nexus{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>

<nav class="navbar">
    <a href="{% url 'feed' %}" class="nav-logo">NEXUS</a>
    <div class="nav-links">
        {% if user.is_authenticated %}
            <a href="{% url 'user_profile' user.username %}" class="nav-link">{{ user.username }}</a>
            <a href="{% url 'logout' %}" class="nav-link nav-link--muted">Sair</a>
        {% else %}
            <a href="{% url 'login' %}" class="nav-link">Entrar</a>
            <a href="{% url 'register' %}" class="nav-btn">Registar</a>
        {% endif %}
    </div>
</nav>

<main class="main-content">
    {% if messages %}
        <div class="messages">
            {% for message in messages %}
                <div class="message message--{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        </div>
    {% endif %}

    {% block content %}{% endblock %}
</main>

<script src="{% static 'js/main.js' %}"></script>
</body>
</html>
